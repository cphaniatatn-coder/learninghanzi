<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hanzi Dice Roll Game</title>
    <style>
        :root {
            --primary-color: #E74C3C; /* Red theme for Chinese/Dice feel */
            --primary-hover: #C0392B;
            --background-color: #F4F6F7;
            --card-color: #FFFFFF;
            --text-color: #2C3E50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--card-color);
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 550px;
            text-align: center;
            box-sizing: border-box;
        }

        h1 {
            font-size: 26px;
            margin-bottom: 10px;
            color: #2C3E50;
        }

        p {
            font-size: 15px;
            color: #7F8C8D;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        textarea {
            width: 100%;
            height: 130px;
            padding: 15px;
            border: 2px solid #BDC3C7;
            border-radius: 10px;
            font-size: 16px;
            resize: none;
            box-sizing: border-box;
            margin-bottom: 25px;
            transition: border-color 0.3s;
        }

        textarea:focus {
            border-color: var(--primary-color);
            outline: none;
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:active {
            transform: scale(0.98);
        }

        .hidden {
            display: none !important;
        }

        /* --- DICE DESIGN --- */
        .dice-container {
            margin: 40px auto;
            width: 160px;
            height: 160px;
            perspective: 600px;
        }

        .dice {
            width: 100%;
            height: 100%;
            background: #FFFFFF;
            border: 4px solid var(--primary-color);
            border-radius: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 75px;
            font-weight: bold;
            color: #2C3E50;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            transition: transform 0.1s ease;
            user-select: none;
        }

        /* Rolling Animation Classes */
        .rolling {
            animation: shake 0.5s infinite linear;
            border-color: #F1C40F !important; /* Gold border when rolling */
            background-color: #FCF3CF;
        }

        @keyframes shake {
            0% { transform: translate(2px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-2deg); }
            20% { transform: translate(-3px, 0px) rotate(2deg); }
            30% { transform: translate(0px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(2deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(2px, 1px) rotate(-2deg); }
            80% { transform: translate(-1px, -1px) rotate(2deg); }
            90% { transform: translate(2px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        .instruction-box {
            background-color: #EAEDED;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            color: #566573;
            margin-bottom: 25px;
        }

        .btn-secondary {
            background-color: #BDC3C7;
            color: #2C3E50;
            margin-top: 15px;
        }
        .btn-secondary:hover {
            background-color: #95A5A6;
        }
    </style>
</head>
<body>

    <!-- SETUP SCREEN -->
    <div id="setup-screen" class="container">
        <h1>🎲 Hanzi Dice Roll Setup</h1>
        <p>Input your vocabulary below. Separate individual Hanzi characters or words using commas, spaces, or new lines.</p>
        <textarea id="hanzi-input" placeholder="e.g., 老师, 学生, 学校, 谢谢, 你好"></textarea>
        <button onclick="setupGame()">Generate Dice</button>
    </div>

    <!-- GAMEPLAY SCREEN -->
    <div id="game-screen" class="container hidden">
        <h1>Roll the Dice!</h1>
        <p>Press the button to roll. When it stops, raise your hand as fast as you can to answer!</p>
        
        <!-- The Dice -->
        <div class="dice-container">
            <div id="dice-face" class="dice">?</div>
        </div>
        
        <div id="status-instruction" class="instruction-box">
            Ready to Roll!
        </div>

        <button id="roll-button" onclick="rollDice()">🎲 Roll Dice</button>
        <button class="btn-secondary" onclick="backToSetup()">⚙️ Edit Words</button>
    </div>

    <script>
        let wordsPool = [];
        let isRolling = false;

        function setupGame() {
            const rawInput = document.getElementById('hanzi-input').value;
            
            // Clean input and split by comma, space, or newline
            wordsPool = rawInput.split(/[\s,，\n]+/).filter(word => word.trim() !== "");

            if (wordsPool.length === 0) {
                alert("Please enter at least one Hanzi character or word first!");
                return;
            }

            // Switch Screen
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            
            // Reset Dice Face
            document.getElementById('dice-face').innerText = "🎲";
            document.getElementById('status-instruction').innerText = "Click 'Roll Dice' to start!";
            document.getElementById('status-instruction').style.backgroundColor = "#EAEDED";
            document.getElementById('status-instruction').style.color = "#566573";
        }

        function rollDice() {
            if (isRolling) return; // Prevent double clicking while rolling
            
            isRolling = true;
            const diceFace = document.getElementById('dice-face');
            const rollBtn = document.getElementById('roll-button');
            const instruction = document.getElementById('status-instruction');
            
            rollBtn.disabled = true;
            instruction.innerText = "Rolling... Get ready!";
            instruction.style.backgroundColor = "#FCF3CF";
            instruction.style.color = "#B7950B";
            diceFace.classList.add('rolling');

            // Simulate the dice shuffling effect by rapidly changing faces
            let shuffleCount = 0;
            const shuffleInterval = setInterval(() => {
                const tempIndex = Math.floor(Math.random() * wordsPool.length);
                diceFace.innerText = wordsPool[tempIndex];
                shuffleCount++;
                
                // Stop rolling after 15 shuffles (approx 1.5 seconds)
                if (shuffleCount > 15) {
                    clearInterval(shuffleInterval);
                    
                    // Pick the final truly random word
                    const finalIndex = Math.floor(Math.random() * wordsPool.length);
                    diceFace.innerText = wordsPool[finalIndex];
                    
                    // Stop animation
                    diceFace.classList.remove('rolling');
                    isRolling = false;
                    rollBtn.disabled = false;
                    
                    // Prompt students to raise hands
                    instruction.innerText = "✋ RAISE YOUR HAND NOW!";
                    instruction.style.backgroundColor = "#D4EFDF";
                    instruction.style.color = "#196F3D";
                }
            }, 100); // changes every 100ms
        }

        function backToSetup() {
            document.getElementById('setup-screen').classList.remove('hidden');
            document.getElementById('game-screen').classList.add('hidden');
        }
    </script>
</body>
</html>
