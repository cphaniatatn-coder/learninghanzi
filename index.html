<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hanzi Roulette Spinner</title>
    <style>
        :root {
            --roulette-red: #C0392B;
            --roulette-gold: #F1C40F;
            --background-dark: #1A252F;
            --card-light: #FFFFFF;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #2C3E50;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--card-light);
            padding: 35px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 550px;
            text-align: center;
            box-sizing: border-box;
            position: relative;
        }

        h1 {
            font-size: 26px;
            margin-bottom: 10px;
            color: #2C3E50;
        }

        p {
            font-size: 15px;
            color: #7F8C8D;
            margin-bottom: 25px;
        }

        textarea {
            width: 100%;
            height: 130px;
            padding: 15px;
            border: 2px solid #BDC3C7;
            border-radius: 12px;
            font-size: 16px;
            resize: none;
            box-sizing: border-box;
            margin-bottom: 25px;
        }

        textarea:focus {
            border-color: var(--roulette-red);
            outline: none;
        }

        /* --- ROULETTE WINDOW DESIGN --- */
        .roulette-wrapper {
            position: relative;
            width: 100%;
            max-width: 320px;
            height: 140px;
            margin: 30px auto;
            background-color: var(--background-dark);
            border: 8px solid var(--roulette-gold);
            border-radius: 16px;
            overflow: hidden; /* Sembunyikan kata di luar kotak jendela */
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8), 0 8px 20px rgba(0,0,0,0.2);
        }

        /* Garis Penunjuk Tengah (Target Pointer) */
        .roulette-wrapper::before, .roulette-wrapper::after {
            content: '';
            position: absolute;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--roulette-gold);
            z-index: 10;
        }
        .roulette-wrapper::before { top: 20px; }
        .roulette-wrapper::after { bottom: 20px; }

        /* Segitiga Penunjuk Kiri-Kanan */
        .pointer-left, .pointer-right {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 0;
            height: 0;
            border-top: 15px solid transparent;
            border-bottom: 15px solid transparent;
            z-index: 11;
        }
        .pointer-left {
            left: 5px;
            border-left: 20px solid var(--roulette-gold);
        }
        .pointer-right {
            right: 5px;
            border-right: 20px solid var(--roulette-gold);
        }

        /* Kontainer Gulungan Kata */
        .roulette-strip {
            position: absolute;
            width: 100%;
            top: 0;
            left: 0;
            transition: transform 0s ease-out; /* Diatur dinamis via JS */
            will-change: transform;
        }

        /* Desain Setiap Item Kata */
        .roulette-item {
            height: 140px;
            line-height: 140px;
            font-size: 65px;
            font-weight: bold;
            color: #FFFFFF;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            box-sizing: border-box;
            background: #2C3E50;
            border-bottom: 1px solid #34495E;
        }

        /* --- CONTROL INTERFACE --- */
        .lever-btn {
            background: linear-gradient(135deg, #E74C3C, #C0392B);
            color: white;
            border: none;
            padding: 16px 32px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 15px rgba(192, 57, 43, 0.4);
            transition: all 0.2s;
            width: 100%;
        }

        .lever-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(192, 57, 43, 0.6);
        }

        .lever-btn:disabled {
            background: #95A5A6;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        .status-alert {
            background-color: #EAEDED;
            padding: 14px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: bold;
            color: #566573;
            margin: 25px 0;
            transition: all 0.3s;
        }

        .winner-flash {
            animation: flashLight 0.4s infinite alternate;
        }

        @keyframes flashLight {
            from { border-color: var(--roulette-gold); background-color: #FFF2CC; }
            to { border-color: #E67E22; background-color: #D4EFDF; }
        }

        .hidden { display: none !important; }

        .btn-secondary {
            background-color: #BDC3C7;
            color: #2C3E50;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <!-- SETUP SCREEN -->
    <div id="setup-screen" class="container">
        <h1>🎰 Hanzi Roulette Setup</h1>
        <p>Input your vocabulary below. Separate them using commas, spaces, or new lines.</p>
        <textarea id="hanzi-input" placeholder="e.g., 老师, 学生, 学校, 谢谢, 你好, 苹果, 飞机, 咖啡"></textarea>
        <button class="lever-btn" onclick="initRoulette()">Load into Roulette</button>
    </div>

    <!-- GAMEPLAY SCREEN -->
    <div id="game-screen" class="container hidden">
        <h1>Hanzi Roulette Wheel</h1>
        <p>Pull the lever to spin the wheel. Be the fastest to raise your hand!</p>
        
        <!-- Roulette Window -->
        <div id="roulette-box" class="roulette-wrapper">
            <div class="pointer-left"></div>
            <div class="pointer-right"></div>
            <div id="strip" class="roulette-strip">
                <!-- Items will be generated dynamically by JavaScript -->
            </div>
        </div>
        
        <!-- Status Notification Box -->
        <div id="game-status" class="status-alert">
            Place your bets and pull the lever!
        </div>

        <button id="spin-button" class="lever-btn" onclick="spinRoulette()">🕹️ Pull Lever (Spin)</button>
        <button class="btn-secondary" onclick="backToSetup()">⚙️ Edit Words</button>
    </div>

    <script>
        let originalWords = [];
        let itemHeight = 140; // Harus sama dengan height .roulette-item di CSS
        let isSpinning = false;

        function initRoulette() {
            const rawInput = document.getElementById('hanzi-input').value;
            originalWords = rawInput.split(/[\s,，\n]+/).filter(word => word.trim() !== "");

            if (originalWords.length === 0) {
                alert("Please enter at least one Hanzi character or word first!");
                return;
            }

            // Ganti layar ke gameplay
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');

            resetRouletteVisuals();
        }

        function resetRouletteVisuals() {
            const strip = document.getElementById('strip');
            strip.style.transition = 'none';
            strip.style.transform = 'translateY(0px)';
            
            // Isi strip dengan kata pertama saja sebagai default awal
            strip.innerHTML = `<div class="roulette-item">${originalWords[0]}</div>`;
            
            const status = document.getElementById('game-status');
            status.innerText = "Ready to Spin!";
            status.className = "status-alert";
            document.getElementById('roulette-box').classList.remove('winner-flash');
        }

        function spinRoulette() {
            if (isSpinning) return;
            isSpinning = true;

            const strip = document.getElementById('strip');
            const spinBtn = document.getElementById('spin-button');
            const status = document.getElementById('game-status');
            const rouletteBox = document.getElementById('roulette-box');

            spinBtn.disabled = true;
            rouletteBox.classList.remove('winner-flash');
            status.innerText = "🎰 Spinning... Watch closely!";
            status.style.backgroundColor = "#FCF3CF";
            status.style.color = "#B7950B";

            // 1. Buat urutan barisan acak yang panjaaaang untuk efek gulungan roulette
            let spinList = [];
            const targetedSpins = 40; // Jumlah lompatan kata sebelum berhenti (bisa ditambah agar makin lama)
            
            for (let i = 0; i < targetedSpins; i++) {
                const randomWord = originalWords[Math.floor(Math.random() * originalWords.length)];
                spinList.push(randomWord);
            }
            
            // Kata terakhir di dalam array adalah kata pemenang target utama kita
            const winningWord = spinList[spinList.length - 1];

            // 2. Render seluruh list ke dalam DOM secara vertikal
            strip.innerHTML = spinList.map(word => `<div class="roulette-item">${word}</div>`).join('');

            // 3. Reset posisi strip ke paling atas secara instan
            strip.style.transition = 'none';
            strip.style.transform = 'translateY(0px)';

            // 4. Jalankan animasi gulungan ke bawah (menggunakan setTimeout agar transisi CSS terbaca browser)
            setTimeout(() => {
                // Jarak geser ke bawah: (total item - 1) dikali tinggi satu kotak kata
                const travelDistance = (targetedSpins - 1) * itemHeight;
                
                // Gunakan cubic-bezier agar gerakan melesat cepat di awal lalu melambat halus di akhir (efek gesekan)
                strip.style.transition = 'transform 3.5s cubic-bezier(0.15, 0.85, 0.35, 1)';
                strip.style.transform = `translateY(-${travelDistance}px)`;
            }, 50);

            // 5. Ketika roda roulette berhenti berputar (setelah 3.5 detik)
            setTimeout(() => {
                isSpinning = false;
                spinBtn.disabled = false;

                // Berikan efek visual kemenangan (lampu kilat berkedip)
                rouletteBox.classList.add('winner-flash');
                status.innerText = "✋ STOP! RAISE YOUR HAND NOW!";
                status.style.backgroundColor = "#D4EFDF";
                status.style.color = "#196F3D";
            }, 3550); 
        }

        function backToSetup() {
            document.getElementById('setup-screen').classList.remove('hidden');
            document.getElementById('game-screen').classList.add('hidden');
        }
    </script>
</body>
</html>
